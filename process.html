<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GD — Process animation (concept)</title>
<style>
  html,body{margin:0;height:100%;background:#05060a;overflow:hidden;font-family:Montserrat,system-ui,sans-serif}
  #c{display:block;width:100vw;height:100vh}
  .cap{position:fixed;left:24px;bottom:20px;z-index:5;color:#7fa8c0;font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:600;opacity:.7}
  .cap b{color:#eaf6ff;font-weight:800}
  #fallback{position:fixed;inset:0;display:none;place-items:center;color:#9fb;}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/Reflector.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<div class="cap"><b>Process</b> &nbsp;·&nbsp; tasks glide the track, get validated, enter the system</div>
<div id="fallback">WebGL unavailable.</div>
<script>
(function(){
  if(!window.THREE){document.getElementById('fallback').style.display='grid';return;}
  const canvas=document.getElementById('c');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0;
  renderer.outputEncoding=THREE.sRGBEncoding;

  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x05060a);
  scene.fog=new THREE.FogExp2(0x05060a,0.045);
  const camera=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,0.1,120);
  camera.position.set(0,2.7,8.2);

  // ---------- environment for glass/ground highlights ----------
  const ec=document.createElement('canvas');ec.width=512;ec.height=256;const ex=ec.getContext('2d');
  ex.fillStyle='#0a0b12';ex.fillRect(0,0,512,256);
  const sp=(x,y,r,col)=>{const g=ex.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,col);g.addColorStop(1,'rgba(10,11,18,0)');ex.fillStyle=g;ex.beginPath();ex.arc(x,y,r,0,7);ex.fill();};
  sp(140,70,90,'rgba(120,225,255,.9)'); sp(380,90,70,'rgba(120,225,255,.5)'); sp(300,200,60,'rgba(255,190,90,.4)');
  const envTex=new THREE.CanvasTexture(ec); envTex.mapping=THREE.EquirectangularReflectionMapping;
  const pmrem=new THREE.PMREMGenerator(renderer); const env=pmrem.fromEquirectangular(envTex).texture;
  scene.environment=env;

  // soft fill lights (most glow comes from emissive + bloom)
  scene.add(new THREE.AmbientLight(0x4060a0,0.5));
  const key=new THREE.DirectionalLight(0xbfe8ff,0.7); key.position.set(2,6,5); scene.add(key);

  // ---------- ground (reflective floor — the big premium lever) ----------
  if(THREE.Reflector){
    const mirror=new THREE.Reflector(new THREE.PlaneGeometry(140,140),{
      clipBias:0.003, color:0x0a0e16,
      textureWidth:Math.min(2048,Math.floor(innerWidth*devicePixelRatio)),
      textureHeight:Math.min(2048,Math.floor(innerHeight*devicePixelRatio))});
    mirror.rotation.x=-Math.PI/2; mirror.position.y=0; scene.add(mirror);
    // faint dark overlay to soften/tint the reflection
    const haze=new THREE.Mesh(new THREE.PlaneGeometry(140,140),new THREE.MeshBasicMaterial({color:0x05060a,transparent:true,opacity:0.45}));
    haze.rotation.x=-Math.PI/2; haze.position.y=0.001; scene.add(haze);
  } else {
    const ground=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.MeshStandardMaterial({color:0x07080e,roughness:0.35,metalness:0.85,envMap:env,envMapIntensity:0.7}));
    ground.rotation.x=-Math.PI/2; scene.add(ground);
  }

  // ---------- the winding TRACK (road ribbon + two neon edge rails) ----------
  const UP=new THREE.Vector3(0,1,0);
  const mid=new THREE.CatmullRomCurve3([
    new THREE.Vector3(-3.7,0.02,3.4), new THREE.Vector3(-1.4,0.02,1.7),
    new THREE.Vector3(0.7,0.02,0.0),  new THREE.Vector3(2.7,0.02,-1.9),
    new THREE.Vector3(4.8,0.02,-4.4)]);
  const N=240, HALF=0.74, L=[], R=[];
  for(let i=0;i<=N;i++){const u=i/N; const p=mid.getPointAt(u); const tan=mid.getTangentAt(u);
    const n=new THREE.Vector3().crossVectors(tan,UP).normalize();
    L.push(p.clone().addScaledVector(n, HALF).setY(0.04));
    R.push(p.clone().addScaledVector(n,-HALF).setY(0.04));}
  // road surface ribbon
  const rv=new Float32Array((N+1)*2*3);
  for(let i=0;i<=N;i++){rv.set([L[i].x,L[i].y,L[i].z],i*6); rv.set([R[i].x,R[i].y,R[i].z],i*6+3);}
  const ri=[]; for(let i=0;i<N;i++){const a=i*2,b=i*2+1,c=i*2+2,d=i*2+3; ri.push(a,b,d, a,d,c);}
  const rg=new THREE.BufferGeometry(); rg.setAttribute('position',new THREE.BufferAttribute(rv,3)); rg.setIndex(ri); rg.computeVertexNormals();
  scene.add(new THREE.Mesh(rg,new THREE.MeshStandardMaterial({color:0x131a2b,roughness:0.45,metalness:0.75,envMap:env,envMapIntensity:0.7,side:THREE.DoubleSide})));
  // neon edge rails (bright → bloom)
  const NEON=0x33dcff;
  function rail(points){const c=new THREE.CatmullRomCurve3(points);
    return new THREE.Mesh(new THREE.TubeGeometry(c,N,0.06,10,false),new THREE.MeshBasicMaterial({color:NEON}));}
  scene.add(rail(L)); scene.add(rail(R));

  // ---------- glowing PORTAL at the front of the track ----------
  function radialTex(inner,mid2){const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');const g=x.createRadialGradient(64,64,3,64,64,64);g.addColorStop(0,inner);g.addColorStop(0.5,mid2);g.addColorStop(1,'rgba(120,205,255,0)');x.fillStyle=g;x.fillRect(0,0,128,128);return new THREE.CanvasTexture(c);}
  const portal=new THREE.Group();
  const pBase=mid.getPointAt(0.02);
  portal.position.set(pBase.x+0.9,1.45,pBase.z+0.1); portal.rotation.y=0.5; scene.add(portal);
  const frameMat=new THREE.MeshPhysicalMaterial({color:0x1c2638,roughness:0.25,metalness:0.7,envMap:env,envMapIntensity:1.0,clearcoat:1});
  function bar(w,h,x,y){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.3),frameMat);m.position.set(x,y,0);portal.add(m);}
  const PW=1.7,PH=2.2,th=0.2;
  bar(th,PH,-PW/2,0); bar(th,PH,PW/2,0); bar(PW+th,th,0,PH/2); bar(PW+th,th,0,-PH/2);
  // soft glowing light inside the doorway (a portal, not a white slab)
  const panel=new THREE.Mesh(new THREE.PlaneGeometry(PW-0.05,PH-0.05),new THREE.MeshBasicMaterial({map:radialTex('rgba(220,244,255,0.95)','rgba(110,200,255,0.5)'),transparent:true,depthWrite:false}));
  panel.position.z=0.03; portal.add(panel);

  // ---------- chip-cards (glass + glowing checkmark) gliding to the portal ----------
  function checkTex(){const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');
    x.strokeStyle='#bff2ff';x.lineWidth=14;x.lineCap='round';x.lineJoin='round';x.beginPath();x.moveTo(30,68);x.lineTo(56,94);x.lineTo(98,38);x.stroke();return new THREE.CanvasTexture(c);}
  const ckTex=checkTex();
  const glassMat=()=>new THREE.MeshPhysicalMaterial({color:0x9cd0f0,roughness:0.06,metalness:0,transparent:true,opacity:0.34,envMap:env,envMapIntensity:0.8,clearcoat:1,clearcoatRoughness:0.05});
  const CHIPS=4, chips=[], phase=[];
  for(let i=0;i<CHIPS;i++){
    const g=new THREE.Group();
    const body=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.7,0.7),glassMat()); g.add(body);
    g.add(new THREE.LineSegments(new THREE.EdgesGeometry(body.geometry),new THREE.LineBasicMaterial({color:0x8fe4ff,transparent:true,opacity:0.6})));
    const face=new THREE.Mesh(new THREE.PlaneGeometry(0.46,0.46),new THREE.MeshBasicMaterial({map:ckTex,transparent:true})); face.position.z=0.36; g.add(face);
    const under=new THREE.Sprite(new THREE.SpriteMaterial({map:makeGlow(),color:NEON,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false})); under.scale.set(1.8,1.8,1); under.position.y=-0.5; g.add(under);
    scene.add(g); chips.push(g); phase.push(i/CHIPS);
  }
  function makeGlow(){const c=document.createElement('canvas');c.width=c.height=64;const x=c.getContext('2d');const grd=x.createRadialGradient(32,32,0,32,32,32);grd.addColorStop(0,'rgba(255,255,255,1)');grd.addColorStop(1,'rgba(255,255,255,0)');x.fillStyle=grd;x.beginPath();x.arc(32,32,32,0,7);x.fill();return new THREE.CanvasTexture(c);}

  // ---------- floating frosted "people" avatars (with faint reflections) ----------
  const avatarMat=new THREE.MeshPhysicalMaterial({color:0x9fbcd8,roughness:0.3,metalness:0,transparent:true,opacity:0.4,envMap:env,envMapIntensity:0.7,clearcoat:1});
  function avatar(){const g=new THREE.Group();
    const head=new THREE.Mesh(new THREE.SphereGeometry(0.26,32,32),avatarMat); head.position.y=0.6; g.add(head);
    const bodyGeo=new THREE.SphereGeometry(0.46,32,32); bodyGeo.scale(0.92,1.25,0.92);
    const body=new THREE.Mesh(bodyGeo,avatarMat); body.position.y=0.05; g.add(body);
    return g;}
  const avPos=[new THREE.Vector3(2.4,1.7,-1.6),new THREE.Vector3(4.1,2.2,-3.7),new THREE.Vector3(0.6,1.9,0.2)];
  const avatars=avPos.map((p,i)=>{const a=avatar(); a.position.copy(p); scene.add(a);
    const r=avatar(); r.position.set(p.x,-(p.y)*0.4,p.z); r.scale.y=-0.5; r.traverse(o=>{if(o.material){o.material=o.material.clone();o.material.opacity=0.12;}}); scene.add(r);
    return {a,base:p.y,ph:i*1.4};});

  // ---------- bloom ----------
  let composer=null;
  if(THREE.EffectComposer&&THREE.UnrealBloomPass){
    composer=new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene,camera));
    composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.5,0.5,0.62));
  }

  function resize(){const w=innerWidth,h=innerHeight; renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); if(composer)composer.setSize(w,h);}
  addEventListener('resize',resize);

  let t=0;
  (function loop(){
    t+=0.01;
    // chips glide toward the portal (u: 1 → 0), grow as they near it
    for(let i=0;i<CHIPS;i++){phase[i]-=0.0016; if(phase[i]<0)phase[i]+=1;
      const u=phase[i]; const p=mid.getPointAt(u);
      chips[i].position.set(p.x,p.y+0.42,p.z);
      const s=0.7+(1-u)*0.55; chips[i].scale.setScalar(s);
      chips[i].rotation.y=0.4+Math.sin(t*0.8+i)*0.15; chips[i].position.y+=Math.sin(t*1.4+i)*0.04;}
    // avatars bob
    avatars.forEach((o,i)=>{o.a.position.y=o.base+Math.sin(t*0.9+o.ph)*0.12; o.a.rotation.y=Math.sin(t*0.3+o.ph)*0.2;});
    panel.material.opacity=0.85+0.12*Math.sin(t*2);
    camera.position.x=Math.sin(t*0.15)*0.4; camera.position.y=2.7+Math.sin(t*0.2)*0.12;
    camera.lookAt(0.4,0.7,-0.4);
    if(composer)composer.render(); else renderer.render(scene,camera);
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
